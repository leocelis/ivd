    date: "2026-02-06"
    change: "Initial intent: IVD community adoption plan"
    reason: "Decouple IVD from ADA to build standalone framework and community that will buy the book"
    evidence: "Research: Myllärniemi 2018 (framework adoption), Diataxis (docs), MCP official docs (hosting), CWL (vendor-neutral spec model)"
