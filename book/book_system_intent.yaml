        placeholder: |
          17.1 Two Starting Points: Greenfield vs Brownfield
              - Greenfield: Start with first module, conventions emerge
              - Brownfield: Initialize with ivd init, capture existing context
          
          17.2 Bootstrap IVD with Project Context
              - Run ivd init to scan project
              - Creates system_intent.yaml with:
                * code_rules (.cursorrules, lint configs)
                * architecture (ARCHITECTURE.md, ADRs, principles)
                * tools_scripts (key scripts, CLIs)
                * libraries_reuse (internal shared libs)
                * key_paths ("map to the stars": entrypoints, modules, workflows, docs, tests)
                * existing_docs (README, API.md, CONTRIBUTING)
              - Review and enrich auto-generated context
          
          17.3 Assess Intent Coverage: Know Where You Stand
              - Run ivd_assess_coverage to see which modules have intents
              - Interpret the coverage report: focus on high-priority gaps
              - Coverage ≠ 100% — intent where it adds value (critical paths, complex logic, team boundaries)
          
          17.4 Check for Existing Features Before Building
              - Use ivd_list_features to see what's already built (derived from intent metadata)
              - Filter by category or tags to avoid duplicating existing features
              - If match exists: extend or reuse, don't create a duplicate
              - Add metadata (feature_id, category, tags, status) to new intents
          
          17.5 First Intent Artifacts for High-Priority Modules
              - Start with high-priority uncovered modules from coverage report
              - Use ivd scaffold --level module --name <module>
              - Auto-links parent_intent: "../../system_intent.yaml"
              - AI loads project context when creating/modifying intents
          
          17.6 Implement and Verify with Project Context
              - New intents follow project code rules
              - New intents reference architecture principles
              - New intents reuse tools/scripts/libraries (no duplication)
              - New intents navigate via key_paths (map to the stars)
          
          17.7 Retrospective: What Worked, What Didn't
              - Re-run ivd_assess_coverage: did coverage improve?
              - Did project_context capture conventions correctly?
              - Are child intents referencing parent correctly?
              - Are new implementations reusing existing tools/libs?
              - What's missing from key_paths or architecture?
          
          17.8 Setting Team Standards and Conventions
              - Update system_intent.yaml as conventions emerge
              - Document in project_context sections
              - The "Intent First" Habit: How to Build It
      
