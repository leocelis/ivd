  target_length: "500–750 pp (25–38 pp/chapter average) to balance comprehensiveness (Code Complete) with accessibility; adjust after first draft. Bestsellers range ~350–1300 pp."
  
  distribution_options:
    free_excerpt: "Consider free web edition of Part I + Project 1 (Ch5) to drive adoption and print/ebook sales (pattern: Automate the Boring Stuff, SICP)."
    target_publishers: "O'Reilly, Pragmatic Bookshelf, Addison-Wesley, Manning, No Starch—strong dev audiences; evidence and recipes suit."
  
  production_workflow:
    - "Write in Markdown (manuscript/)"
    - "Validate Markdown and links"
    - "Convert to EPUB (Pandoc) → build/epub/"
    - "Convert to PDF (Pandoc) → build/pdf/"
    - "Validate EPUB (epubcheck), Kindle Preview"
    - "Final review and publication"
  
  next_steps:
    - "Set up book repository with chapter folders"
    - "Create writing schedule (3-4 months, phase 1)"
    - "Start with Part I, Chapter 1 (proven content from existing IVD docs)"
    - "Build Project 1 (Chapter 5) in parallel to validate approach"
    - "Run first validation experiment (context efficiency)"
  
  tools:
    - "Markdown for writing (portable, versionable)"
    - "Pandoc for EPUB/PDF generation"
    - "GitHub for version control and collaboration"
    - "Amazon KDP for publishing"
    - "Python for validation experiments"
  
  repository_structure: |
    ivd-book/
    ├── manuscript/
    │   ├── front-matter/
    │   ├── part-1-foundations/
    │   │   ├── chapter-01-alignment-crisis.md
    │   │   ├── chapter-02-new-paradigm.md
    │   │   └── ...
    │   ├── part-2-practice/
    │   ├── part-3-validation/
    │   ├── part-4-adoption/
    │   └── back-matter/
    ├── code-examples/
    │   ├── project-1-classification/
    │   ├── project-2-workflow/
    │   └── ...
    ├── validation-experiments/
    │   ├── context-efficiency/
    │   ├── alignment-accuracy/
    │   └── ...
    ├── assets/
    │   ├── diagrams/
    │   └── images/
    └── build/
        ├── epub/
        └── pdf/

