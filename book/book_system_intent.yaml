changelog:
  - version: "2.9"
    date: "2026-02-09"
    changes: |
      Ch3 key_points: added empirical refinement (P3 extension) — when implementation
      reveals intent assumptions are wrong, STOP, update intent, continue. Ch3 placeholder
      updated to note empirical refinement in §3.3. Aligns with ivd_system_intent v2.1.
  - version: "2.8"
    date: "2026-02-09"
    changes: |
      Added Cognitive Foundation block to book goal — the parametric vs. contextual
      knowledge distinction as the book's theoretical thesis and intellectual moat.
      LLMs rely ~70% contextual, ~30% parametric. Prose underloads contextual channel →
      parametric gap-filling = hallucination. IVD saturates contextual channel with
      near-zero-entropy structured intent. This frames why the framework matters at the
      LLM architecture level — no other methodology explains this.
  - version: "2.7"
    date: "2026-03-02"
    changes: |
      REWROTE monetization_strategy — eliminated all time-for-money streams
      (consulting, workshops, speaking, cohort courses, community/membership,
      manual certification). Replaced with fully automated SaaS-centric
      strategy aligned with leocelis.com blog intent v2.2. Three content
      engines (leocelis blog → CTOs top-down, IVD Book → devs bottom-up,
      ITV Blog → engineers via SEO) all feed one IVD SaaS platform.
      Retained: IVD SaaS ($1-30M ARR), enterprise bundles ($500K-3M/yr),
      automated certification ($1-5M/yr), individual sales ($100-300K/yr).
      Added rejected streams list, unified funnel architecture, sequence.
      New principle: zero Leo-hours per dollar earned after build phase.
      Revenue ceiling: $2.6M-38M/year at 2-4 hrs/week writing.
