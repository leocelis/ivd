# ==============================================================================
# INTENT: What should this book accomplish?
# ==============================================================================

intent:
  summary: "The definitive book on Intent-Verified Development (IVD): the framework for the AI Agents era that eliminates many-turns and hallucinations by having AI write, implement, and verify intent."
  
  goal: |
    Produce a comprehensive book that fully explains Intent-Verified Development for the AI Agents era:
    
    Core Problem Solved:
    - AI agents fill gaps in prompts with plausible but wrong assumptions (hallucinations)
    - Working with AI requires many turns of correction (exhausting, expensive)
    - Traditional artifacts (PRDs, user stories, prompts) are not verifiable by AI
    
    Cognitive Foundation (why the problem exists and why IVD solves it):
    - LLMs have two knowledge systems: parametric (training weights, ~30% reliance) and
      contextual (the prompt/context window, ~70% reliance). Models prioritize contextual.
    - Prose (PRDs, prompts, user stories) underloads the contextual channel — it is
      ambiguous enough that the model must fill gaps from parametric memory (generalized
      training-data patterns). That gap-filling IS hallucination.
    - Structured intent artifacts saturate the contextual channel with specific, verifiable,
      near-zero-entropy information. The model has nothing to guess.
    - IVD is, at its core, a framework for maximizing the quality of contextual knowledge.
    - The book's intellectual moat: no other methodology explains WHY at this level.
    
    IVD Solution:
    - The AI writes a structured intent artifact (not the human)
    - The AI implements against the intent artifact
    - The AI verifies its code against executable constraints
    - Turns drop from many to one; hallucinations are caught at the source
    
    Book Structure:
    1. Part I: Paradigm and principles (AI writes intent, AI verifies)
    2. Part II: Practice (6 real projects with AI agents)
    3. Part III: Validation (measurable results)
    4. Part IV: Adoption (organizational playbook)
    
    A reader who finishes this book understands IVD completely and can immediately work with AI agents using intent-verified workflows.
  
  success_metric: |
    Market Performance:
    - #1 ranking in "AI & Machine Learning" category on Amazon
    - 1,000+ reviews with 4.5+ star average
    - 10,000+ copies sold in first year
    - Featured in AI/tech publications and podcasts
    - Become required reading for AI engineering teams (pattern: Clean Code, Accelerate, Design Patterns)
    
    Technical Quality:
    - All principles validated with real project data (Part III is the money chapter — evidence is the moat)
    - 10+ case studies with measurable outcomes
    - Executable code examples and templates
    - 95%+ reader satisfaction on "immediate applicability"
    - Reproducible experiments: token counts (tiktoken), iteration counts, onboarding speed, recipe time savings
    
    Impact:
    - 1,000+ teams adopt IVD from the book
    - Community contributions to IVD framework
    - Industry recognition and speaking engagements
    - Book becomes the standard reference for human-AI development methodology
  
  # ============================================================================
  # MONETIZATION STRATEGY (Revised Mar 3, 2026)
  # ============================================================================
  # The book IS the product. Not a funnel to a SaaS.
  # Full revenue strategy lives in leocelis_blog_intent.yaml.
  # This section covers book-specific economics only.
  
  monetization_strategy: |
    CORE PRINCIPLE: The book is the scalable revenue asset.
    No SaaS. No platform. No certification. No tooling to productize.
    Leo writes. The writing makes the money.

    === BOOK REVENUE ===

    Conservative (niche tech book):
      10,000 copies × $40 = $400K lifetime
      + Kindle + Audible = $600K lifetime

    Moderate (category-defining — "Clean Code" tier):
      50,000 copies × $40 = $2M lifetime
      + Kindle + Audible = $3M lifetime

    Breakout (mainstream crossover — "Zero to One" tier):
      200,000+ copies × $35 = $7M+ lifetime
      + Kindle + Audible + translations = $10M+ lifetime

    Formats: Print (Amazon), Kindle, Audiobook (Audible).
    Publisher deal vs self-publish TBD (reach vs margin).

    === WHAT THE BOOK DOES BEYOND SALES ===

    1. AUTHORITY — every copy sold is a reader who tells their CTO about Leo.
       Named frameworks in the book become industry vocabulary.
    2. PREMIUM INBOUND — founders/CTOs read the book, reach out for
       advisory (equity, not hourly). The book does the qualifying.
    3. SPEAKING (optional) — conferences come to Leo after the book.
       $10-50K per keynote. Not required, but the book creates the option.
    4. CATEGORY OWNERSHIP — first definitive book on AI-OS / intent-driven
       development. First mover owns the shelf.

    === WHAT WILL NOT WORK (REJECTED) ===

    - IVD SaaS platform — requires months of engineering before dollar one.
    - MCP server productization — premature. Ideas need publishing first.
    - Certification program — requires platform and ongoing maintenance.
    - Enterprise bundles / team licenses — SaaS thinking. Rejected.
    - Consulting / retainers — time-for-money with a ceiling.
    - Cohort-based courses — requires Leo every cohort.
    - Franchise model — rejected.

    The test: "Does this generate revenue from writing, or does it require
    building software?" If software → reject. Write instead.

    === THE SEQUENCE ===

    1. Now → April: Publish weekly blog posts (chapter drafts). Outline book.
    2. April → June: 15+ posts. Book outline complete. First draft 5-6 chapters.
    3. June → Sept: Book first draft complete. Query publishers OR self-publish.
    4. Sept → Dec: Book launches. Blog has 35+ posts. Sales + authority compound.
    5. 2027: Book selling. Blog has 50+ posts. Leo owns the category.
       Advisory/equity opportunities land. Optional: build tool if demand proven.
  
