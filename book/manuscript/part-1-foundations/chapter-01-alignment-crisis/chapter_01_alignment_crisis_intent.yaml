      (2) Fixed stale process reference: "book/chapter_writing_process.yaml" →
          "book/chapter_writing_process_intent.yaml" (actual filename).
      (3) Added alternatives section (present in all other chapter intents but missing from Ch1).
    reason: "Bring Ch1 intent to the same quality bar as newer intents; Principle 2 compliance."
  - version: "2.4"
