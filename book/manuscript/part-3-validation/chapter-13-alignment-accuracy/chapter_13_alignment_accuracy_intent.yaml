  cross_check:
    - check: "All key_points from book_system_intent Ch13 appear or are clearly implied in chapter"
      validates: "intent.success_metric"
    - check: "All deliverables.sections (13.1–13.7) are present with required_content"
      validates: "deliverables"
    - check: "Manuscript has Key Points/Summary block"
      validates: "constraints.chapter_takeaways"
    - check: "Human judge evaluation rubric (0-10 scale) is presented as a reusable artifact with clear dimension definitions"
      validates: "deliverables.sections[13.2], key_points"
    - check: "Three experiment data tables present with iteration counts, alignment scores, and time elapsed"
      validates: "deliverables.manuscript.required_elements"
    - check: "Aggregate summary table in section 13.5 with cross-experiment analysis"
      validates: "deliverables.sections[13.5]"
    - check: "Edge case section (13.6) contains at least 4 documented scenarios where baseline matches or outperforms IVD, with at least 1 quantitative comparison"
      validates: "constraints.honest_edge_cases"
    - check: "All measurements marked as author experience with explicit caveats"
      validates: "constraints.no_unsourced_statistics"
    - check: "Writing style: prose leads; data tables and experiments illustrate (Part III style)"
      validates: "constraints.writing_style_part_3"
    - check: "Bridge to Chapter 14 (knowledge durability) present in 13.7"
      validates: "deliverables.sections[13.7]"
    - check: "No contradictions with ivd_system_intent.yaml or book_system_intent.yaml"
      validates: "constraints.master_intent_alignment"

