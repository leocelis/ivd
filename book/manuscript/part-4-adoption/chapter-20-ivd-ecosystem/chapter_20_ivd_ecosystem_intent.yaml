# VERIFICATION (cross-check with book intent, MCP server intent, IVD framework)
# ==============================================================================

verification:
  cross_check:
    - check: "All key_points from book_system_intent Ch20 appear or are clearly implied in chapter"
      validates: "intent.success_metric"
    - check: "All deliverables.sections (20.1–20.7) are present with required_content"
      validates: "deliverables"
    - check: "Manuscript has Key Points/Summary block and getting-started checklist"
      validates: "constraints.chapter_takeaways, constraints.checklist_included"
    - check: "Section 20.4 presents the IVD MCP server as a dogfooding case study with all 15 tools documented"
      validates: "deliverables.sections[20.4], constraints.tool_accuracy"
    - check: "All 15 tool names in section 20.4 match mcp_server/mcp_server_intent.yaml interface.tools exactly"
      validates: "constraints.tool_accuracy"
    - check: "IDE integration section covers Cursor, Cline, Aider, and GitHub Copilot with cross-IDE pattern"
      validates: "deliverables.sections[20.3]"
    - check: "Writing style: prose leads, examples illustrate (Part IV style)"
      validates: "constraints.writing_style_part_4"
    - check: "Bridge to Chapter 21 (future of IVD) present in 20.7"
      validates: "deliverables.sections[20.7]"
    - check: "No contradictions with ivd_system_intent.yaml, book_system_intent.yaml, or mcp_server_intent.yaml"
      validates: "constraints.master_intent_alignment, constraints.tool_accuracy"
    - check: "Getting-started checklist in 20.7 has actionable steps (install, init, write, validate, join, share)"
      validates: "constraints.checklist_included"

