# ==============================================================================
# VERIFICATION
# ==============================================================================

verification:
  integration_tests:
    - name: "end_to_end_happy_path"
      description: "Complete workflow from API call to CRM sync"
      input: |
        POST /api/v1/leads
        {"email": "john@acme.com", "company": "Acme Corp"}
      expected_output: |
        - Lead created in database
        - Enriched with company data
        - Scored >= 0.70
        - Qualified = true
        - Synced to Salesforce
        - Salesforce Lead ID returned
      validates_constraint: "workflow_completion_rate"
      runtime: "~3 seconds"
      
    - name: "step_2_enrichment_failure_recovery"
      description: "Workflow continues with partial enrichment"
      input: "Valid lead data"
      mock: "Clearbit API returns 503 (unavailable)"
      expected_output: |
        - Step 2 uses cached data or defaults
        - enrichment_confidence = 0.5 (low)
        - Workflow continues to step 3
        - Scoring uses available data
        - Workflow completes (may or may not qualify)
      validates_constraint: "error_resilience"
      
    - name: "disqualified_lead_no_crm_sync"
      description: "Disqualified leads don't sync to CRM"
      input: |
        {"email": "student@university.edu", "company": "University"}
      expected_output: |
        - Steps 1-4 complete successfully
        - Step 4 returns qualified = false (student domain)
        - Step 5 does NOT execute
        - Final status = "disqualified"
        - No Salesforce record created
      validates_constraint: "workflow_completion_rate"
  
  performance_tests:
    - name: "end_to_end_latency_p95"
      description: "Workflow completes within 3 seconds"
      input: "100 concurrent lead submissions"
      expected: "p95 < 3 seconds"
      validates_constraint: "end_to_end_latency"
      
    - name: "throughput_under_load"
      description: "Workflow handles 100+ leads/minute"
      input: "150 leads/minute for 5 minutes"
      expected: "All workflows complete, no failures"
      validates_constraint: "throughput"
  
  accuracy_validation:
    - name: "qualification_precision_validation"
      description: "Sales team agrees with qualification decisions"
      methodology: |
        - Sample 100 qualified leads/month
        - Sales reps review and mark as "agree" or "disagree"
        - Calculate precision = agrees / total
      expected: ">= 85% agreement"
      validates_constraint: "qualified_lead_precision"
      frequency: "Monthly"
      
    - name: "qualification_recall_validation"
      description: "Catch good leads (don't miss opportunities)"
      methodology: |
        - Sample 50 disqualified leads/month
        - Sales ops reviews manually
        - Check for false negatives (should have qualified)
        - Calculate recall = true_positives / (true_positives + false_negatives)
      expected: ">= 70% recall"
      validates_constraint: "qualified_lead_recall"
      frequency: "Monthly"
  
  monitoring_verification:
    - name: "dashboard_completeness"
      description: "Dashboard shows all critical metrics"
      verification: |
        - Workflow completion rate (per step and overall)
        - Latency (per step and end-to-end)
        - Error rates (per step)
        - Qualification rate (% of leads qualified)
        - CRM sync success rate
      dashboard: "dashboards/lead_qualification_dashboard.json"
      
    - name: "alerting_validation"
      description: "Alerts fire when thresholds breached"
      verification: |
        - Manually trigger failures
        - Verify PagerDuty alerts fire
        - Verify Slack notifications sent
        - Verify dashboard shows anomalies

